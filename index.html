<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>РЁР”Р§РЎ вҖ” РЁРёС„СҖРҫРІР°Р»СҢСүРёРә</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .output { font-family: 'Courier New', monospace; letter-spacing: 2px; }
  </style>
</head>
<body class="bg-gradient-to-br from-zinc-950 via-slate-900 to-indigo-950 text-white min-h-screen">

  <div class="max-w-3xl mx-auto p-6 pt-12">
    <div class="text-center mb-10">
      <h1 class="text-6xl font-black mb-2 bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500 bg-clip-text text-transparent">
        рҹ”җ РЁР”Р§РЎ
      </h1>
      <p class="text-2xl text-slate-300">РЁРёС„СҖРҫРІР°РҪРёРө Р§РёСҒР»Рҫ-РЎРёРјРІРҫР»СӢ</p>
    </div>

    <div class="bg-zinc-900/80 backdrop-blur-2xl rounded-3xl shadow-2xl border border-slate-700 overflow-hidden">
      <div class="flex border-b border-slate-700">
        <button onclick="switchTab(0)" class="tab-btn flex-1 py-5 text-lg font-semibold border-b-4 border-cyan-500 text-cyan-400">Р—Р°СҲРёС„СҖРҫРІР°СӮСҢ</button>
        <button onclick="switchTab(1)" class="tab-btn flex-1 py-5 text-lg font-semibold">Р Р°СҒСҲРёС„СҖРҫРІР°СӮСҢ</button>
      </div>

      <!-- Р—Р°СҲРёС„СҖРҫРІР°СӮСҢ -->
      <div id="tab0" class="p-8">
        <textarea id="plainText" rows="5" class="w-full bg-zinc-950 border border-slate-600 rounded-2xl p-6 text-lg focus:outline-none focus:border-cyan-400 resize-y" placeholder="Р’РІРөРҙРёСӮРө СӮРөРәСҒСӮ..."></textarea>
        
        <div class="grid grid-cols-2 gap-6 mt-6">
          <div>
            <label class="block text-slate-400 mb-2 text-sm">Р“РҫРҙ</label>
            <input type="number" id="encYear" value="2026" class="w-full bg-zinc-950 border border-slate-600 rounded-2xl p-5 text-xl">
          </div>
          <div>
            <label class="block text-slate-400 mb-2 text-sm">РңРөСҒСҸСҶ</label>
            <input type="number" id="encMonth" value="5" min="1" max="12" class="w-full bg-zinc-950 border border-slate-600 rounded-2xl p-5 text-xl">
          </div>
        </div>

        <button onclick="encrypt()" class="w-full mt-8 bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-600 hover:to-purple-700 py-6 rounded-3xl text-2xl font-bold transition-all">
          рҹ”’ Р—Р°СҲРёС„СҖРҫРІР°СӮСҢ СӮРөРәСҒСӮ
        </button>

        <div id="encResult" class="mt-8 hidden">
          <div class="flex justify-between items-center mb-3">
            <p class="text-slate-400">Р РөР·СғР»СҢСӮР°СӮ:</p>
            <button onclick="copyResult('encOutput')" class="text-cyan-400 hover:text-cyan-300">рҹ“Ӣ РҡРҫРҝРёСҖРҫРІР°СӮСҢ</button>
          </div>
          <div id="encOutput" class="output bg-zinc-950 border border-slate-600 rounded-3xl p-6 text-lg break-all"></div>
        </div>
      </div>

      <!-- Р Р°СҒСҲРёС„СҖРҫРІР°СӮСҢ -->
      <div id="tab1" class="p-8 hidden">
        <textarea id="cipherText" rows="5" class="w-full bg-zinc-950 border border-slate-600 rounded-2xl p-6 text-lg focus:outline-none focus:border-cyan-400 resize-y" placeholder="Р’СҒСӮР°РІСҢСӮРө Р·Р°СҲРёС„СҖРҫРІР°РҪРҪСӢР№ СӮРөРәСҒСӮ..."></textarea>
        
        <div class="flex gap-4 mt-8">
          <button onclick="decryptAuto()" class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-600 py-6 rounded-3xl text-xl font-bold">рҹ”Қ РҗРІСӮРҫРҝРҫРҙРұРҫСҖ</button>
          <button onclick="showManualDecrypt()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-6 rounded-3xl text-xl font-bold">Р’СҖСғСҮРҪСғСҺ</button>
        </div>

        <div id="manualPanel" class="hidden grid grid-cols-2 gap-6 mt-6">
          <div>
            <label class="block text-slate-400 mb-2">Р“РҫРҙ</label>
            <input type="number" id="decYear" value="2026" class="w-full bg-zinc-950 border border-slate-600 rounded-2xl p-5">
          </div>
          <div>
            <label class="block text-slate-400 mb-2">РңРөСҒСҸСҶ</label>
            <input type="number" id="decMonth" value="5" min="1" max="12" class="w-full bg-zinc-950 border border-slate-600 rounded-2xl p-5">
          </div>
          <button onclick="decryptManual()" class="col-span-2 mt-4 bg-slate-700 hover:bg-slate-600 py-5 rounded-3xl">Р Р°СҒСҲРёС„СҖРҫРІР°СӮСҢ</button>
        </div>

        <div id="decResult" class="mt-8 hidden">
          <div class="flex justify-between items-center mb-3">
            <p class="text-slate-400">Р Р°СҒСҲРёС„СҖРҫРІР°РҪРҫ:</p>
            <button onclick="copyResult('decOutput')" class="text-cyan-400 hover:text-cyan-300">рҹ“Ӣ РҡРҫРҝРёСҖРҫРІР°СӮСҢ</button>
          </div>
          <div id="decOutput" class="output bg-zinc-950 border border-slate-600 rounded-3xl p-6 text-lg"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const EVEN = {1:["РәР°С„Рө",1],2:["РәРҫС„Рө",2],3:["Р¶СҺСҖРё",3],4:["Р·Р°СҸСҶ",4],5:["СҺРі",5],6:["СҒСҮС‘СӮ",6],7:["Р·Р°СҖСҸ",1],8:["Р°СҖРұСғР·",2],9:["РҙРҫРј",3],10:["РәРҫСӮ",4],11:["РјР°Рә",5],12:["СҖР°Рә",6]};
    const ODD = {1:["СҖР°Рә",1],2:["РјРҫСҖ",2],3:["РјРёСҖ",3],4:["СҮР°СҒ",4],5:["СҺР»Р°",5],6:["РөР»СҢ",6],7:["РёРІР°",1],8:["РҫРәРҫ",2],9:["РјРёРі",3],10:["РјРөР»",4],11:["Р»РҫРІ",5],12:["Р·РҫРІ",6]};

    let SYMBOL_TO_NUM = {}, NUM_TO_SYMBOL = {}, DIGIT_TO_SYMBOL = {'0':'Q','1':'!','2':'@','3':'D','4':'$','5':'|','6':'?','7':'&','8':'*','9':'\\'};
    let SYMBOL_TO_DIGIT = {};

    function init() {
      "РҗР‘Р’Р“Р”Р•РҒР–Р—РҳРҷРҡРӣРңРқРһРҹР РЎРўРЈРӨРҘРҰР§РЁР©РӘР«Р¬РӯР®РҜ".split('').forEach((c,i)=> SYMBOL_TO_NUM[c]=i+1);
      "Р°РұРІРіРҙРөС‘Р¶Р·РёР№РәР»РјРҪРҫРҝСҖСҒСӮСғС„С…СҶСҮСҲСүСҠСӢСҢСҚСҺСҸ".split('').forEach((c,i)=> SYMBOL_TO_NUM[c]=i+34);
      Object.assign(SYMBOL_TO_NUM, {' ':67,'.':68,',':69,'!':70,'?':71,'-':72,';':73,':':74,'(':75,')':76,'"':77,'\n':78});
      NUM_TO_SYMBOL = Object.fromEntries(Object.entries(SYMBOL_TO_NUM).map(a=>[a[1],a[0]]));
      SYMBOL_TO_DIGIT = Object.fromEntries(Object.entries(DIGIT_TO_SYMBOL).map(a=>[a[1],a[0]]));
    }

    function getCode(year, month) {
      return (year % 2 === 0 ? EVEN : ODD)[month] || ["",0];
    }

    function encrypt() {
      const text = document.getElementById('plainText').value;
      const year = +document.getElementById('encYear').value;
      const month = +document.getElementById('encMonth').value;
      let nums = text.split('').map(c => SYMBOL_TO_NUM[c] || 0);
      let [, add] = getCode(year, month);
      let shifted = nums.map(n => n + add);
      let result = '';
      for (let n of shifted) {
        let s = n.toString().padStart(2,'0');
        for (let d of s) result += DIGIT_TO_SYMBOL[d];
      }
      result += getCode(year, month)[0].toUpperCase();
      document.getElementById('encOutput').textContent = result;
      document.getElementById('encResult').classList.remove('hidden');
    }

    function decrypt(cipher, year, month) {
      let text = cipher.trim();
      const [word, add] = getCode(year, month);
      if (!word) return "РһСҲРёРұРәР°";
      if (!text.toUpperCase().endsWith(word.toUpperCase())) return "РҡРҫРҙРҫРІРҫРө СҒР»РҫРІРҫ РҪРө РҪР°Р№РҙРөРҪРҫ";
      let part = text.slice(0, -word.length);
      if (part.length % 2 !== 0) return "РһСҲРёРұРәР° РҙР»РёРҪСӢ";
      let digits = '';
      for (let c of part) digits += SYMBOL_TO_DIGIT[c] || '';
      let nums = [];
      for (let i=0; i<digits.length; i+=2) nums.push(+digits.slice(i,i+2));
      return nums.map(n => NUM_TO_SYMBOL[n - add] || '?').join('');
    }

    function decryptAuto() {
      const cipher = document.getElementById('cipherText').value.trim();
      const output = document.getElementById('decOutput');
      output.innerHTML = 'РҳРҙС‘СӮ РҝРҫРёСҒРә...';
      document.getElementById('decResult').classList.remove('hidden');
      for (let y=2020; y<=2035; y++) {
        for (let m=1; m<=12; m++) {
          const res = decrypt(cipher, y, m);
          if (res && !res.includes('РһСҲРёРұРәР°')) {
            output.innerHTML = `<strong>вң… РЈСҒРҝРөСҲРҪРҫ!</strong><br>Р“РҫРҙ: ${y} | РңРөСҒСҸСҶ: ${m}<br><br>${res}`;
            return;
          }
        }
      }
      output.textContent = "РқРө СғРҙР°Р»РҫСҒСҢ РҝРҫРҙРҫРұСҖР°СӮСҢ РҝР°СҖР°РјРөСӮСҖСӢ";
    }

    function decryptManual() {
      const cipher = document.getElementById('cipherText').value;
      const year = +document.getElementById('decYear').value;
      const month = +document.getElementById('decMonth').value;
      const res = decrypt(cipher, year, month);
      document.getElementById('decOutput').textContent = res;
      document.getElementById('decResult').classList.remove('hidden');
    }

    function showManualDecrypt() {
      document.getElementById('manualPanel').classList.toggle('hidden');
    }

    function copyResult(id) {
      navigator.clipboard.writeText(document.getElementById(id).textContent);
      alert("РЎРәРҫРҝРёСҖРҫРІР°РҪРҫ!");
    }

    function switchTab(n) {
      document.getElementById('tab0').classList.add('hidden');
      document.getElementById('tab1').classList.add('hidden');
      document.getElementById(`tab${n}`).classList.remove('hidden');
    }

    init();
    switchTab(0);
  </script>
</body>
</html>
